<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Henna ❤️</title>

<style>
body {
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#ffdde1,#ee9ca7,#ffd1dc);
overflow-x:hidden;

/* ✅ CURSOR FIX (.cur) */
cursor: url('cursor.cur') 16 16, auto;
}

/* intro */
#intro {
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: linear-gradient(135deg,#ffdde1,#ee9ca7);
z-index:999;
}

/* main */
.container {
max-width:850px;
margin:60px auto;
padding:25px;
text-align:center;
background:rgba(255,255,255,0.3);
border-radius:25px;
backdrop-filter:blur(10px);
display:none;
}

h1 { color:#ff3d6e; }

/* ✅ TEXT FIX */
#typing {
font-size:18px;
line-height:1.8;
white-space:pre-line;
word-wrap:break-word;
overflow-wrap:break-word;
}

/* gallery */
.gallery {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:20px;
}
.gallery img {
width:100%;
border-radius:15px;
}

/* buttons */
button {
padding:10px 20px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
margin-top:10px;
}

/* hearts */
@keyframes floatUp {
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}
</style>
</head>

<body>

<div id="intro">
<h2>Tap to open your birthday surprise 🎁</h2>
<button id="openBtn">Open 💖</button>
</div>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="container" id="mainContent">

<h1>Happy Birthday Henna ❤️</h1>

<button id="letterBtn">Read my letter 💌</button>

<div id="typing"></div>

<div class="gallery">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
</div>

<button id="playBtn">Tap this 💌</button>
<div id="secret" style="display:none;">I WILL ALWAYS BE URS ❤️</div>

</div>

<script>
window.onload=function(){

const message = `MY HZU,

I cant imagine spending a single day without you, ik we have our ups and downs but ever since we've met i love life, everything about you feels so unreal that sometimes i question that even if ur real or not, your love makes me feel the emotions i never knew existed, ik we both are very short tempered have flaws but the way we always try n make it up n all is obv that we are meant to be together, I promise ill be the best bf now and will act just as how you like, will never give u a chance to complain and be bad at me bs daikho aap ab

I Love you and always will in this life and others as well, if i could get chance to relive life i'd want you to be my gf in every. There is something about you that makes life livable, enjoyable, happy and most importantly makes life look different. I never knew someone could have this much impact on me but for 2 years we've met everything is just better man

Im sorry for hurting you whenever i did and i promise ill makeup for everything 

Forever yours,
Ayandu ❤️`;

/* ✅ TYPEWRITER FIX */
function typeWriter(){
let i=0;
let el=document.getElementById("typing");
el.textContent="";
el.style.display="block";

function step(){
if(i<message.length){
el.textContent += message.charAt(i);
i++;
setTimeout(step,12);
}
}
step();
}

/* open */
openBtn.onclick=function(){
intro.style.display="none";
mainContent.style.display="block";

bgmusic.volume=0.2;
bgmusic.play();
};

/* open letter */
letterBtn.onclick=function(){
typeWriter();
};

/* second button */
playBtn.onclick=function(){
document.getElementById("secret").style.display="block";
};

/* hearts */
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.bottom="-20px";
h.style.fontSize="20px";
h.style.animation="floatUp 6s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

};
</script>

</body>
</html>
