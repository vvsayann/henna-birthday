<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Henna ❤️</title>

<style>
body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ffd1dc);
overflow-x: hidden;
}

.container {
max-width: 850px;
margin: 60px auto;
padding: 25px;
text-align: center;
background: rgba(255,255,255,0.3);
border-radius: 25px;
}

h1 { color:#ff3d6e; }

.gallery {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.gallery img {
width:100%;
border-radius:15px;
}

button {
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
}

#secret { display:none; margin-top:15px; }

@media(max-width:768px){
.gallery{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:480px){
.gallery{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="container">
<h1>Happy Birthday Henna ❤️</h1>

<div id="typing"></div>

<div class="gallery">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
</div>

<button id="playBtn">Tap this 💌</button>

<div id="secret">I love you more every day. — Ayan ❤️</div>
</div>

<script>

const message = `MY HZU,

I cant imagine spending a single day without you...
Forever yours,
Ayandu ❤️`;

let i = 0;

function typeWriter(){
if(i < message.length){
document.getElementById("typing").innerHTML += message.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}

typeWriter();

/* ✅ FINAL BUTTON FIX */
document.getElementById("playBtn").addEventListener("click", function(){
let music = document.getElementById("bgmusic");
music.play();
document.getElementById("secret").style.display = "block";
});

/* hearts */
setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.bottom="0";
heart.style.fontSize="20px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);
},500);

</script>

</body>
</html>
